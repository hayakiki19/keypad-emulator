name: Build EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        env:
          VGAMEPAD_SKIP_VIGEMBUS_INSTALL: "true"
        run: pip install pyinstaller pynput vgamepad

      - name: Build EXE
        run: pyinstaller --onefile --windowed --name KeyPadEmulator --hidden-import pynput.keyboard._win32 --hidden-import pynput.mouse._win32 --collect-all vgamepad keypad_emulator.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: KeyPadEmulator
          path: dist/KeyPadEmulator.exe
